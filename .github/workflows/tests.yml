name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck copilot-loop.sh copilot-loop-tui.sh tests/*.sh

      - name: Run test suite
        run: tests/run-all.sh
